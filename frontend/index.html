<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Lobster Office</title>
  <style>
    @font-face {
      font-family: "ArkPixel";
      src: url("/static/fonts/ark-pixel-12px-proportional-latin.ttf.woff2") format("woff2");
      font-weight: normal;
      font-style: normal;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "ArkPixel", "Courier New", monospace;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 20px 0 28px;
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      z-index: 99999;
    }

    #loading-text {
      color: #ffd700;
      margin-bottom: 14px;
      font-size: 18px;
    }

    #loading-progress-container {
      width: 320px;
      height: 20px;
      border: 2px solid #555;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
    }

    #loading-progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #e94560, #ffd700);
      transition: width 0.2s ease;
    }

    #game-container {
      width: 1280px;
      height: 720px;
      max-width: 96vw;
      border: 4px solid #e94560;
      image-rendering: pixelated;
      aspect-ratio: 16 / 9;
    }

    #game-container canvas {
      width: 100% !important;
      height: 100% !important;
      image-rendering: pixelated;
      object-fit: contain;
    }

    #bottom-panels {
      width: 1280px;
      max-width: 96vw;
      display: grid;
      grid-template-columns: 1fr 360px 360px;
      gap: 16px;
    }

    .panel {
      background: #2c2f3a;
      border: 2px solid #e94560;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.45);
      min-height: 290px;
    }

    .panel-title {
      color: #ffd700;
      text-align: center;
      border-bottom: 2px solid #4a4f5f;
      padding-bottom: 8px;
      margin-bottom: 12px;
      letter-spacing: 1px;
      font-size: 15px;
    }

    #memo-panel {
      background-image: url('/static/memo-bg.png');
      background-size: cover;
      border-width: 3px;
      color: #2d2d2d;
    }

    #memo-title {
      color: #1f2937;
      text-align: center;
      margin-bottom: 6px;
      font-size: 14px;
      letter-spacing: 1px;
    }

    #memo-date {
      color: #374151;
      text-align: right;
      font-size: 11px;
      margin-bottom: 8px;
    }

    #memo-content {
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      overflow-y: auto;
      max-height: 220px;
      padding-right: 4px;
    }

    #memo-placeholder {
      font-style: italic;
      color: #6b7280;
      text-align: center;
      padding: 24px 0;
    }

    #control-buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    button {
      font-family: "ArkPixel", monospace;
      border: 2px solid #555;
      border-radius: 4px;
      background: #3a3f4f;
      color: #fff;
      padding: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 44px;
    }

    button:hover {
      background: #4a4f5f;
      border-color: #e94560;
    }

    #guest-agent-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 236px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .empty-list {
      color: #9ca3af;
      text-align: center;
      font-size: 12px;
      padding: 24px 0;
    }

    .guest-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      background: #3a3f4f;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 8px 10px;
    }

    .guest-name {
      font-size: 13px;
      color: #fff;
    }

    .guest-sub {
      font-size: 11px;
      color: #cbd5e1;
    }

    .leave-btn {
      background: #5a1818;
      border-color: #e94560;
      min-height: 34px;
      padding: 6px 10px;
      font-size: 11px;
      white-space: nowrap;
    }

    #status-text {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 12px;
      max-width: 92vw;
      text-align: center;
      background: rgba(0, 0, 0, 0.72);
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 13px;
      z-index: 2000;
    }

    #coords-overlay {
      position: fixed;
      display: none;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.85);
      border-radius: 4px;
      font-size: 13px;
      padding: 8px 10px;
      z-index: 5000;
    }

    #coords-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 5001;
      padding: 8px 10px;
      min-height: auto;
    }

    @media (max-width: 980px), (pointer: coarse) {
      body {
        padding: 0;
        gap: 0;
      }

      #game-container {
        width: 100vw;
        height: 66vh;
        max-width: 100vw;
        border-width: 0;
      }

      #bottom-panels {
        width: 100vw;
        max-width: 100vw;
        grid-template-columns: 1fr;
        padding: 10px;
      }

      .panel {
        min-height: 200px;
      }

      #status-text {
        bottom: 6px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div id="loading-text">Loading Star Lobster Office...</div>
    <div id="loading-progress-container">
      <div id="loading-progress-bar"></div>
    </div>
  </div>

  <div id="game-container"></div>

  <div id="bottom-panels">
    <div id="memo-panel" class="panel">
      <div id="memo-title">YESTERDAY SUMMARY</div>
      <div id="memo-date"></div>
      <div id="memo-content">
        <div id="memo-placeholder">Loading memo...</div>
      </div>
    </div>

    <div id="control-bar" class="panel">
      <div class="panel-title">STAR STATE</div>
      <div id="control-buttons">
        <button onclick="setState('standby','Standing by.')">Standby</button>
        <button onclick="setState('working','Heads-down on active work.')">Working</button>
        <button onclick="setState('research','Researching options and evidence.')">Research</button>
        <button onclick="setState('running','Executing the active plan.')">Running</button>
        <button onclick="setState('sync','Syncing updates now.')">Sync</button>
        <button onclick="setState('incident','Handling an active incident.')">Incident</button>
      </div>
    </div>

    <div id="guest-agent-panel" class="panel">
      <div class="panel-title">GUEST AGENTS</div>
      <div id="guest-agent-list">
        <div class="empty-list">Loading guest agents...</div>
      </div>
    </div>
  </div>

  <div id="status-text">Initializing office dashboard...</div>
  <div id="coords-overlay">
    <div id="coords-display">0, 0</div>
  </div>
  <button id="coords-toggle">Show Coords</button>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="/static/layout.js?v={{VERSION_TIMESTAMP}}"></script>
  <script src="/static/game.js?v={{VERSION_TIMESTAMP}}"></script>
</body>
</html>
