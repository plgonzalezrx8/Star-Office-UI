<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Star Lobster Office</title>
  <style>
    @font-face {
      font-family: "ArkPixel";
      src: url("/static/fonts/ark-pixel-12px-proportional-latin.ttf.woff2") format("woff2");
      font-weight: normal;
      font-style: normal;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #fff;
      font-family: "ArkPixel", "Courier New", monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      padding: 36px 18px;
    }

    h1 {
      color: #ffd700;
      font-size: 24px;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: #2c2f3a;
      border: 3px solid #e94560;
      border-radius: 12px;
      padding: 22px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #d1d5db;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      border: 2px solid #555;
      background: #3a3f4f;
      color: #fff;
      font-family: "ArkPixel", monospace;
      font-size: 13px;
    }

    button {
      width: 100%;
      min-height: 44px;
      border-radius: 6px;
      border: 2px solid #e94560;
      background: #e94560;
      color: #fff;
      font-family: "ArkPixel", monospace;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #ff6b81;
    }

    #leaveBtn {
      margin-top: 10px;
      background: #555;
      border-color: #555;
    }

    #leaveBtn:hover {
      background: #666;
    }

    .status {
      margin-top: 16px;
      border-radius: 6px;
      padding: 10px;
      text-align: center;
      font-size: 13px;
      display: none;
    }

    .status.ok {
      background: rgba(76, 175, 80, 0.2);
      border: 2px solid #4caf50;
      color: #4caf50;
    }

    .status.error {
      background: rgba(244, 67, 54, 0.2);
      border: 2px solid #f44336;
      color: #f44336;
    }

    .note {
      max-width: 560px;
      text-align: center;
      color: #9ca3af;
      font-size: 12px;
      line-height: 1.7;
    }

    .note a {
      color: #ffd700;
      text-decoration: underline;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>Join Star Lobster Office</h1>

  <div class="container">
    <div class="form-group">
      <label>Your display name</label>
      <input type="text" id="agentName" placeholder="Example: Lobster Assistant" maxlength="20">
    </div>

    <div class="form-group">
      <label>Join key</label>
      <input type="text" id="joinKey" placeholder="Enter your one-time join key" maxlength="64">
    </div>

    <button id="joinBtn">Join Office</button>
    <button id="leaveBtn">Leave Office</button>

    <div id="status" class="status"></div>
  </div>

  <div class="note">
    This page only needs your name and join key. Your OpenClaw agent will push state updates automatically after approval.<br><br>
    Invite instructions: <a href="/invite">https://office.example.com/invite</a>
  </div>

  <script>
    const joinBtn = document.getElementById("joinBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const statusDiv = document.getElementById("status");
    const agentNameInput = document.getElementById("agentName");
    const joinKeyInput = document.getElementById("joinKey");

    function showStatus(text, ok) {
      statusDiv.style.display = "block";
      statusDiv.textContent = text;
      statusDiv.className = "status " + (ok ? "ok" : "error");
    }

    async function joinOffice() {
      const name = agentNameInput.value.trim();
      const joinKey = joinKeyInput.value.trim();

      if (!name) {
        showStatus("Please enter your display name first.", false);
        return;
      }
      if (!joinKey) {
        showStatus("Please enter your join key first.", false);
        return;
      }

      try {
        const response = await fetch("/agents/join", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, joinKey })
        });
        const data = await response.json();
        if (data.ok) {
          showStatus("Joined successfully. Refresh the office dashboard to see your agent.", true);
        } else {
          showStatus(data.msg || "Join request failed.", false);
        }
      } catch (error) {
        showStatus("Network error. Please try again.", false);
      }
    }

    async function leaveOffice() {
      const name = agentNameInput.value.trim();
      if (!name) {
        showStatus("Please enter the name you want to remove.", false);
        return;
      }

      try {
        const response = await fetch("/agents/leave", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name })
        });
        const data = await response.json();
        if (data.ok) {
          showStatus("Removed from office.", true);
        } else {
          showStatus(data.msg || "Leave request failed.", false);
        }
      } catch (error) {
        showStatus("Network error. Please try again.", false);
      }
    }

    joinBtn.addEventListener("click", joinOffice);
    leaveBtn.addEventListener("click", leaveOffice);
  </script>
</body>
</html>
